<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you · PixelForge</title>
  <!-- same fonts / style for consistency -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .thankyou-card {
      background: white;
      max-width: 600px;
      padding: 3.5rem 3rem;
      border-radius: 3rem;
      box-shadow: 0 30px 50px -30px rgba(79,70,229,0.3);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.5);
      animation: fadeUp 0.8s ease;
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .icon-circle {
      background: rgba(79,70,229,0.1);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 3rem;
      color: #4f46e5;
      box-shadow: 0 10px 25px -10px #4f46e5;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #1e1f2a, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1.2rem;
      color: #5b5d6e;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-weight: 600;
      transition: 0.2s;
      box-shadow: 0 10px 20px -8px #4f46e5;
      border: 1px solid transparent;
    }
    .btn:hover {
      background: #6366f1;
      transform: scale(1.02);
      box-shadow: 0 18px 30px -12px #4f46e5;
    }
    .btn i { margin-right: 0.5rem; }
  </style>
</head>
<body>
  <div class="thankyou-card">
    <div class="icon-circle">
      <i class="fa-regular fa-circle-check"></i>
    </div>
    <h1>Message forged!</h1>
    <p>Your request has been sent to the PixelForge team.<br>We’ll reply within 24 hours — time to create something awesome.</p>
    <a href="index.html" class="btn"><i class="fa-regular fa-arrow-left"></i> Back to home</a>
  </div>
</body>
</html>
